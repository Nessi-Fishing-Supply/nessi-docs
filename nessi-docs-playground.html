<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nessi Docs — Platform Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
/*
  NESSI DOCS PLAYGROUND v3
  All data hardcoded from nessi-web-app. innerHTML only uses static developer content.
*/
:root{
  --g1:#d6e9e4;--g4:#3d8c75;--g5:#1e4a40;--g6:#163831;--g7:#0e2822;
  --o1:#fbe9d9;--o4:#e89048;--o5:#e27739;
  --m4:#b84040;--m5:#681a19;--w5:#b86e0a;--s5:#1a6b43;
  --b0:#090b0e;--b1:#0f1319;--b2:#161c26;--b3:#1e2636;--b4:#283044;--b5:#323e54;
  --t1:#e8e6e1;--t2:#9a9790;--t3:#6a6860;--t4:#4a4840;
  --bd1:rgba(255,255,255,.05);--bd2:rgba(255,255,255,.09);--bd3:rgba(255,255,255,.15);
  --fs:'DM Sans',system-ui,sans-serif;--ff:'DM Serif Display',georgia,serif;--fm:'DM Mono','SF Mono',monospace;
  --ease:cubic-bezier(.16,1,.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{font-family:var(--fs);background:var(--b0);color:var(--t1);line-height:1.5;overflow:hidden;height:100vh}
::selection{background:rgba(61,140,117,.3)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* ═══ LAYOUT ═══ */
.app{display:grid;grid-template-columns:220px 1fr 280px;grid-template-rows:48px 1fr;height:100vh}

/* Topbar */
.top{grid-column:1/-1;display:flex;align-items:center;padding:0 16px;background:var(--b1);border-bottom:1px solid var(--bd1);gap:10px;z-index:50}
.logo{display:flex;align-items:center;gap:8px}
.lm{width:22px;height:22px;background:linear-gradient(135deg,var(--g4),var(--g6));border-radius:5px;display:flex;align-items:center;justify-content:center;font:700 13px/1 var(--ff);color:var(--b0)}
.lt{font:16px/1 var(--ff);color:var(--t1)}
.ls{font:500 9px/1 var(--fm);color:var(--t4);letter-spacing:.05em;text-transform:uppercase;margin-left:1px}
.sep{width:1px;height:18px;background:var(--bd2)}
.topinfo{font:10px/1 var(--fm);color:var(--t4);margin-left:auto}

/* ═══ LEFT SIDEBAR — Main Nav + Contextual Sub-nav ═══ */
.side{background:var(--b1);border-right:1px solid var(--bd1);overflow-y:auto;padding:0;grid-row:2;display:flex;flex-direction:column}
.nav{padding:12px 10px 0}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;font:500 12px/1 var(--fs);color:var(--t3);cursor:pointer;transition:all 150ms var(--ease);border:none;background:none;width:100%;text-align:left}
.nav-item:hover{color:var(--t2);background:var(--b3)}
.nav-item.on{color:var(--t1);background:var(--b2);box-shadow:inset 3px 0 0 var(--g4)}
.nav-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:13px;opacity:.6;flex-shrink:0}
.nav-item.on .nav-icon{opacity:1}
.nav-sep{height:1px;background:var(--bd1);margin:10px 12px}
.subnav{padding:4px 10px 12px;flex:1;overflow-y:auto}
.subnav-title{font:600 9px/1 var(--fs);letter-spacing:.1em;text-transform:uppercase;color:var(--t4);margin-bottom:6px;padding:0 10px}
.sub-item{display:flex;flex-direction:column;padding:7px 10px;border-radius:6px;cursor:pointer;transition:all 150ms var(--ease);border:none;background:none;text-align:left;width:100%;font-family:var(--fs);margin-bottom:1px}
.sub-item:hover{background:var(--b3)}
.sub-item.on{background:var(--b2);box-shadow:inset 2px 0 0 var(--g4)}
.sub-title{font:500 11.5px/1.2 var(--fs);color:var(--t1);display:flex;align-items:center;gap:5px;margin-bottom:2px}
.sub-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sub-meta{font:10px/1 var(--fm);color:var(--t4)}

/* ═══ MAIN AREA ═══ */
.main{grid-row:2;position:relative;overflow:hidden;display:flex;flex-direction:column;background:var(--b0)}

/* Filter bar */
.filterbar{display:none;padding:8px 16px;background:var(--b1);border-bottom:1px solid var(--bd1);flex-shrink:0}
.filterbar.show{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.fb-group{display:flex;align-items:center;gap:4px}
.fb-label{font:600 9px/1 var(--fs);letter-spacing:.06em;text-transform:uppercase;color:var(--t4);margin-right:4px}
.fb-chip{padding:3px 9px;font:500 10px/1 var(--fs);border-radius:999px;cursor:pointer;transition:all 120ms var(--ease);border:1px solid;user-select:none}
.fb-chip.on{box-shadow:0 0 6px currentColor}
.fb-chip:not(.on){opacity:.2}
.fb-sep{width:1px;height:16px;background:var(--bd2)}
.fb-toggle{padding:3px 10px;font:500 10px/1 var(--fs);color:var(--t3);background:var(--b2);border:1px solid var(--bd2);border-radius:999px;cursor:pointer;transition:all 150ms var(--ease);position:absolute;top:8px;right:12px;z-index:20}
.fb-toggle:hover{color:var(--t1);border-color:var(--bd3)}

/* Canvas */
.canvas{flex:1;position:relative;overflow:hidden;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(61,140,117,.03) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 85% 75%,rgba(226,119,57,.02) 0%,transparent 70%)}
.canvas svg{width:100%;height:100%;cursor:grab}
.canvas svg:active{cursor:grabbing}
.zoom{position:absolute;bottom:10px;left:10px;display:flex;background:var(--b1);border:1px solid var(--bd2);border-radius:6px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:10}
.zb{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--t2);cursor:pointer;font:12px var(--fm);transition:all 120ms var(--ease)}
.zb:hover{background:var(--b3);color:var(--t1)}
.zb+.zb{border-left:1px solid var(--bd1)}
.zl{position:absolute;bottom:10px;left:100px;font:10px var(--fm);color:var(--t4);background:var(--b1);padding:3px 6px;border-radius:4px;border:1px solid var(--bd1);z-index:10}
.pathbar{position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:5px;background:var(--b2);border:1px solid var(--bd2);border-radius:999px;padding:4px 10px 4px 14px;font:500 10px/1 var(--fm);color:var(--t3);z-index:20;white-space:nowrap;max-width:70%;overflow:hidden;cursor:pointer;transition:all 150ms var(--ease)}
.pathbar:hover{border-color:var(--bd3);background:var(--b3)}
.pathbar .pa{color:var(--g4)}.pathbar .ps{color:var(--t4);margin:0 1px}
.pathbar .clear-x{margin-left:6px;color:var(--t4);font:500 12px/1 var(--fs);opacity:.5;transition:opacity .15s}.pathbar:hover .clear-x{opacity:1}
.pathbar:empty{display:none}
.tip{position:absolute;pointer-events:none;background:var(--b2);border:1px solid var(--bd3);border-radius:8px;padding:9px 11px;box-shadow:0 8px 28px rgba(0,0,0,.5);max-width:220px;z-index:100;opacity:0;transition:opacity .1s ease;font-size:11px}
.tip.show{opacity:1}

/* SVG Nodes */
.nd{cursor:pointer}.nd:hover .nb{filter:brightness(1.25)}.nd.on .nb{stroke-width:2;filter:brightness(1.4) drop-shadow(0 0 10px var(--nc))}.nd.dim{opacity:.18}
.nb{transition:filter .2s}.nl{font:500 11px 'DM Sans',sans-serif;fill:var(--t1);pointer-events:none}.ns{font:9px 'DM Mono',monospace;fill:var(--t3);pointer-events:none}
.nbar{rx:2}.ed{cursor:pointer}
.dn{cursor:pointer}.dn:hover .db{filter:brightness(1.3)}.db{transition:filter .2s}.dl{font:600 10px 'DM Sans',sans-serif;fill:var(--t1);pointer-events:none;text-anchor:middle}
.dopt{cursor:pointer;transition:opacity .15s}.dopt:hover .doptbg{filter:brightness(1.3)}.dopt.chosen .doptbg{stroke-width:2;filter:brightness(1.5)}.dopt.unchosen{opacity:.35}.dopt.unchosen:hover{opacity:.7}.doptbg{transition:filter .2s}.doptlbl{font:500 9.5px 'DM Sans',sans-serif;fill:var(--t1);pointer-events:none}
.conn{fill:none;stroke-width:1.5;transition:opacity .25s ease,stroke-width .25s ease}.conn.flow{stroke:var(--g4);opacity:.3}.conn.dec{stroke:var(--o4);stroke-dasharray:6 3;opacity:.25}.conn.lit{opacity:.75!important;stroke-width:2.5}.conn.dim{opacity:.06!important}
@keyframes fp{0%{stroke-dashoffset:20}100%{stroke-dashoffset:0}}.anim{stroke-dasharray:4 16;animation:fp 1.8s linear infinite;opacity:.5;fill:none;stroke-width:1.5}.anim.dim{opacity:0}.anim.lit{opacity:.7}
.flt{font:13px 'DM Serif Display',serif;fill:var(--t3)}.fltr{font:italic 9px 'DM Sans',sans-serif;fill:var(--t4)}

/* Overlay views */
.ov{display:none;flex:1;overflow-y:auto;padding:20px 24px}
.ov.on{display:block}

/* API */
.apg{margin-bottom:22px}.apgt{font:15px/1 var(--ff);color:var(--t1);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd1)}
.apr{display:grid;grid-template-columns:52px 1fr;gap:8px;padding:7px 8px;border-radius:6px;margin-bottom:1px;transition:all 120ms var(--ease);align-items:start;cursor:pointer;border:1px solid transparent}
.apr:hover{background:var(--b3)}.apr.on{background:var(--b2);border-color:var(--g4)}
.apm{font:600 9px/1 var(--fm);padding:3px 5px;border-radius:4px;text-align:center;white-space:nowrap}
.apm.GET{background:rgba(61,140,117,.12);color:var(--g4)}.apm.POST{background:rgba(226,119,57,.12);color:var(--o5)}.apm.PUT{background:rgba(184,142,10,.12);color:var(--w5)}.apm.DELETE{background:rgba(184,64,64,.10);color:var(--m4)}
.api{display:flex;flex-direction:column;gap:1px}.app2{font:12px/1 var(--fm);color:var(--t2)}.apd{font:11px/1.3 var(--fs);color:var(--t3)}

/* Data model */
.ent{background:var(--b2);border:1px solid var(--bd1);border-radius:8px;margin-bottom:6px;overflow:hidden;cursor:pointer;transition:all 120ms var(--ease)}
.ent:hover{border-color:var(--bd3)}.ent.on{border-color:var(--g4)}
.enth{padding:10px 12px;display:flex;align-items:center;justify-content:space-between}
.entn{font:600 12px/1 var(--fm);color:var(--g4)}.entb{font:10px/1 var(--fm);color:var(--t4);background:var(--b0);padding:2px 6px;border-radius:999px}
.entf{padding:0 12px 8px;display:none}.entf.open{display:block}
.ef{display:flex;gap:0;padding:4px 0;font-size:11px;border-bottom:1px solid var(--bd1)}.ef:last-child{border-bottom:none}
.efn{font-family:var(--fm);color:var(--t1);width:150px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.eft{font-family:var(--fm);color:var(--o4);font-size:10px;width:90px;flex-shrink:0}
.efd{color:var(--t3);font-size:10px;flex:1;min-width:0}

/* Lifecycle */
.lc-card{background:var(--b2);border:1px solid var(--bd1);border-radius:8px;margin-bottom:10px;cursor:pointer;transition:all 120ms var(--ease);overflow:hidden}
.lc-card:hover{border-color:var(--bd3)}.lc-card.on{border-color:var(--g4)}
.lc-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.lc-name{font:600 13px/1 var(--fs);color:var(--t1)}.lc-badge{font:10px/1 var(--fm);color:var(--t4);background:var(--b0);padding:2px 7px;border-radius:999px}
.lc-desc{padding:0 14px 10px;font:11px/1.4 var(--fs);color:var(--t3)}
.lc-svg{padding:8px 14px 14px}

/* Coverage */
.cc{background:var(--b2);border:1px solid var(--bd1);border-radius:8px;padding:16px;margin-bottom:8px;cursor:pointer;transition:all 120ms var(--ease)}
.cc:hover{border-color:var(--bd3)}.cc.on{border-color:var(--g4)}
.cct{font:14px/1 var(--ff);color:var(--t1);margin-bottom:3px}.ccd{font:11px/1 var(--fm);color:var(--t4);margin-bottom:10px}
.cbs{display:flex;flex-direction:column;gap:6px}
.cbr{display:flex;align-items:center;gap:8px}.cbl{font:11px/1 var(--fs);color:var(--t2);width:60px}
.cbt{flex:1;height:5px;background:var(--b0);border-radius:3px;overflow:hidden}.cbf{height:100%;border-radius:3px;transition:width 700ms var(--ease)}
.cbv{font:600 10px/1 var(--fm);width:32px;text-align:right}

/* ═══ RIGHT PANEL ═══ */
.pan{grid-row:2;background:var(--b1);border-left:1px solid var(--bd1);overflow-y:auto;display:flex;flex-direction:column}
.pe{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t4);text-align:center;padding:20px;gap:8px}
.pei{font-size:22px;opacity:.2}.pet{font:12px/1.6 var(--fs)}
.dh{padding:14px;border-bottom:1px solid var(--bd1)}
.dlbl{font:15px/1.2 var(--ff);color:var(--t1);margin-bottom:8px}
.dtags{display:flex;gap:4px;flex-wrap:wrap}
.dtag{font:500 10px/1 var(--fs);padding:3px 8px;border-radius:999px;display:flex;align-items:center;gap:3px}
.dtag .dd{width:5px;height:5px;border-radius:50%}
.dsec{padding:12px 14px;border-bottom:1px solid var(--bd1)}
.dsect{font:600 9px/1 var(--fs);letter-spacing:.08em;text-transform:uppercase;color:var(--t4);margin-bottom:6px}
.drt{font:12px/1.3 var(--fm);color:var(--o4);background:var(--b0);padding:6px 8px;border-radius:6px;border:1px solid var(--bd1);word-break:break-all}
.dcr{font:11px/1.3 var(--fm);color:var(--g4);word-break:break-all}
.dnt{font:12px/1.5 var(--fs);color:var(--t2)}
.dwhy{font:12px/1.5 var(--fs);color:var(--t2);padding:8px 10px;background:rgba(61,140,117,.05);border-radius:6px;border-left:2px solid var(--g4)}
.derr{padding:6px 8px;border-radius:6px;background:rgba(184,64,64,.06);border:1px solid rgba(184,64,64,.10);margin-bottom:4px}
.derrc{font:500 11px/1.2 var(--fs);color:var(--m4);margin-bottom:1px}.derrr{font:11px/1.2 var(--fs);color:var(--t3)}.derrs{font:10px/1 var(--fm);color:var(--t4);margin-top:1px}
.dfield{padding:4px 0;display:flex;gap:0;font-size:11px;border-bottom:1px solid var(--bd1)}.dfield:last-child{border-bottom:none}
.dfn{font-family:var(--fm);color:var(--t1);width:130px;flex-shrink:0}.dft{font-family:var(--fm);color:var(--o4);font-size:10px;width:80px;flex-shrink:0}.dfd{color:var(--t3);font-size:10px;flex:1}

/* Lifecycle state node in SVG */
.st-node{cursor:pointer}.st-node:hover rect{filter:brightness(1.3)}
.st-label{font:500 10px 'DM Sans',sans-serif;pointer-events:none;text-anchor:middle}
.st-arrow{fill:none;stroke-width:1.5}
.st-albl{font:9px 'DM Mono',monospace;pointer-events:none}
</style>
</head>
<body>
<div class="app">
<header class="top">
  <div class="logo"><div class="lm">N</div><span class="lt">Nessi</span><span class="ls">Docs</span></div>
  <div class="sep"></div>
  <span class="topinfo">docs.nessifishingsupply.com</span>
</header>
<aside class="side" id="side"></aside>
<main class="main" id="main">
  <div class="filterbar" id="filterbar"></div>
  <button class="fb-toggle" id="fb-toggle" onclick="togFilter()">Filters</button>
  <div class="canvas" id="canvasWrap">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3d8c75" opacity=".5"/></marker>
        <marker id="ao" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#e89048" opacity=".45"/></marker>
        <pattern id="gr" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0L0 0 0 24" fill="none" stroke="rgba(255,255,255,.025)" stroke-width=".5"/></pattern>
      </defs>
      <rect width="5000" height="5000" fill="url(#gr)"/>
      <g id="sg"></g>
    </svg>
    <div class="zoom"><button class="zb" onclick="doZ(-.1)">&minus;</button><button class="zb" onclick="rstZ()">&#9678;</button><button class="zb" onclick="doZ(.1)">+</button></div>
    <div class="zl" id="zl">100%</div>
    <div class="pathbar" id="pathbar" onclick="rstPath()"></div>
    <div class="tip" id="tip"></div>
  </div>
  <div class="ov" id="ov-api"></div>
  <div class="ov" id="ov-data"></div>
  <div class="ov" id="ov-lc"></div>
  <div class="ov" id="ov-cov"></div>
</main>
<aside class="pan" id="pan"></aside>
</div>
<script>
/* All data hardcoded from nessi-web-app. innerHTML only uses developer-controlled static templates. */

const LC={client:{l:'Client',c:'#3d8c75'},server:{l:'Server',c:'#e27739'},database:{l:'Database',c:'#1e4a40'},background:{l:'Background',c:'#b86e0a'},email:{l:'Email',c:'#b84040'},external:{l:'External',c:'#78756f'}};
const SC={planned:{l:'Planned',c:'#5c5a55'},built:{l:'Built',c:'#3d8c75'},tested:{l:'Tested',c:'#1a6b43'}};
const PC={guest:'#78756f',auth:'#3d8c75',onboarding:'#b86e0a',buyer:'#1e4a40',seller:'#e27739','shop-owner':'#e89048','shop-member':'#b84040'};

// ─── JOURNEYS ───
const JJ=[
{slug:'signup',title:'Signup (Email + OTP)',persona:'auth',desc:'Register with email/password, verify via OTP, then background side effects.',
nodes:[
{id:'start',type:'entry',label:'User clicks Sign Up',x:60,y:180,layer:'client',status:'built'},
{id:'modal',type:'step',label:'Open Auth Modal',x:240,y:180,layer:'client',status:'built',code:'src/features/auth/components/auth-modal/index.tsx',notes:'Navbar Sign Up button opens modal',why:'Single entry point for all auth flows keeps the UI clean and avoids full page navigations during signup.'},
{id:'creds',type:'step',label:'Enter Email + Password',x:440,y:180,layer:'client',status:'built',code:'src/features/auth/components/register-form/index.tsx',notes:'Email format, password min 8 chars, terms checkbox',why:'Client-side validation prevents unnecessary server round-trips and gives instant feedback on common mistakes.'},
{id:'submit',type:'step',label:'Submit Registration',x:640,y:180,layer:'server',status:'built',route:'POST /api/auth/register',code:'src/app/api/auth/register/route.ts',notes:'Admin client creates user, triggers OTP email',errors:[{cond:'Email already registered',result:'Show sign-in-instead link',http:409}],why:'Using admin client to create the user bypasses Supabase email confirmation flow, giving us control over the OTP experience.'},
{id:'otp-view',type:'step',label:'Transition to OTP',x:840,y:180,layer:'client',status:'built',notes:'Same modal, swap to 6-digit code entry',why:'Keeping OTP in the same modal avoids losing context. No page navigation = no risk of invite tokens being lost from URL params.'},
{id:'enter-otp',type:'step',label:'Enter 6-Digit Code',x:1040,y:180,layer:'client',status:'built',code:'src/features/auth/components/otp-input/index.tsx',notes:'Auto-submit when 6 digits entered'},
{id:'d-resend',type:'decision',label:'Code received?',x:1240,y:180,options:[{label:'Yes \u2192 Verify',to:'verify'},{label:'Resend (60s)',to:'enter-otp'}]},
{id:'verify',type:'step',label:'Verify OTP',x:1440,y:140,layer:'server',status:'built',notes:'verifyOtp(type=signup) sets session cookies',errors:[{cond:'Invalid/expired code',result:'Show error, allow retry'}],why:'OTP verification establishes the Supabase session via cookies, which proxy.ts and all server components depend on for auth checks.'},
{id:'session',type:'step',label:'Session Established',x:1640,y:140,layer:'server',status:'built'},
{id:'d-invite',type:'decision',label:'Invite token present?',x:1840,y:140,options:[{label:'Yes \u2192 Auto-accept',to:'accept'},{label:'No \u2192 Skip',to:'cart-merge'}]},
{id:'accept',type:'step',label:'Auto-Accept Invite',x:2040,y:60,layer:'background',status:'built',route:'POST /api/invites/[token]/accept',notes:'Failure never blocks account creation',why:'Users arriving from shop invite emails should seamlessly join the shop after signup without manual acceptance. Silent failure ensures the account is always created.'},
{id:'cart-merge',type:'step',label:'Merge Guest Cart',x:2040,y:220,layer:'background',status:'built',route:'POST /api/cart/merge',why:'Guests may have added items before signing up. Merging prevents lost cart state and reduces purchase friction.'},
{id:'rv-merge',type:'step',label:'Merge Recently Viewed',x:2240,y:140,layer:'background',status:'built',route:'POST /api/recently-viewed/merge'},
{id:'d-onboard',type:'decision',label:'Onboarding done?',x:2440,y:140,options:[{label:'No \u2192 Onboarding',to:'onboard'},{label:'Yes \u2192 Dashboard',to:'done'}]},
{id:'onboard',type:'step',label:'Redirect to /onboarding',x:2640,y:80,layer:'client',status:'built',code:'src/proxy.ts',why:'proxy.ts enforces onboarding completion before allowing access to any authenticated page. This prevents incomplete profiles from creating listings or joining shops.'},
{id:'done',type:'step',label:'Ready \u2014 User Signed In',x:2640,y:200,layer:'client',status:'built'}
],edges:[
{from:'start',to:'modal'},{from:'modal',to:'creds'},{from:'creds',to:'submit'},{from:'submit',to:'otp-view'},

{m:'POST',p:'/api/listings',d:'Create draft listing (X-Nessi-Context)',why:'Shop context via X-Nessi-Context: shop:{id} header. Field whitelist (ALLOWED_CREATE_FIELDS) prevents mass assignment.'},
{m:'GET',p:'/api/listings/[id]',d:'Single listing with photos',why:'Non-active listings (draft/archived/deleted) only visible to owner. Returns 404 for non-owners viewing non-active.'},

// ═══ HELPERS ═══
function h(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}
function tr(s,n){return s.length>n?s.slice(0,n)+'\u2026':s}
function svg(t,a){const e=document.createElementNS('http://www.w3.org/2000/svg',t);for(const[k,v]of Object.entries(a))e.setAttribute(k,String(v));return e}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ═══ RENDER ═══
function init(){renderSide();renderMain();renderPanel();}

function renderSide(){
  const el=document.getElementById('side');
  let html='<div class="nav">';
  PAGES.forEach(p=>{
    html+=`<button class="nav-item${p.id===S.page?' on':''}" onclick="goPage('${p.id}')"><span class="nav-icon">${p.icon}</span>${esc(p.label)}</button>`;
  });
  html+='</div>';
  if(S.page==='journeys'){
    html+=`<div class="nav-sep"></div><div class="subnav"><div class="subnav-title">Journeys</div>`;
    JJ.forEach((j,i)=>{
      const ns=j.nodes.filter(n=>n.type==='step').length;
      const nd=j.nodes.filter(n=>n.type==='decision').length;
      html+=`<button class="sub-item${i===S.ji?' on':''}" onclick="selJ(${i})"><div class="sub-title"><span class="sub-dot" style="background:${PC[j.persona]||'#78756f'}"></span>${esc(j.title)}</div><div class="sub-meta">${ns} steps \u00B7 ${nd} decisions</div></button>`;
    });
    html+='</div>';
  }
  if(S.page==='lifecycle'){
    html+=`<div class="nav-sep"></div><div class="subnav"><div class="subnav-title">Lifecycles</div>`;
    LIFECYCLES.forEach((lc,i)=>{
      html+=`<button class="sub-item${i===S.li?' on':''}" onclick="selLi(${i})"><div class="sub-title"><span class="sub-dot" style="background:${lc.states[1]?.c||'#3d8c75'}"></span>${esc(lc.name)}</div><div class="sub-meta">${lc.states.length} states \u00B7 ${lc.transitions.length} transitions</div></button>`;
    });
    html+='</div>';
  }
  el.innerHTML=html;
}

function goPage(id){S.page=id;S.sel=null;S.selApi=null;S.selEnt=null;S.selLc=null;S.selCov=null;S.zoom=1;S.px=0;S.py=0;renderSide();renderMain();renderPanel();}
function selJ(i){S.ji=i;S.sel=null;S.chosenPath=[];S.zoom=1;S.px=0;S.py=0;renderSide();renderMain();renderPanel();}
function selLi(i){S.li=i;S.sel=null;S.zoom=1;S.px=0;S.py=0;renderSide();renderMain();renderPanel();}

function renderMain(){
  const cv=document.getElementById('canvasWrap');
  const fb=document.getElementById('filterbar');
  const fbt=document.getElementById('fb-toggle');
  ['ov-api','ov-data','ov-cov'].forEach(id=>document.getElementById(id).classList.remove('on'));
  cv.style.display='none';fb.classList.remove('show');fbt.style.display='none';
  document.getElementById('pathbar').style.display='none';

  if(S.page==='journeys'){
    cv.style.display='';fbt.style.display='';
    document.getElementById('pathbar').style.display='';
    if(S.filterOpen)renderFilters();
    renderCanvas();
  } else if(S.page==='lifecycle'){
    cv.style.display='';
    renderLcCanvas();
  } else if(S.page==='api'){renderApiView();document.getElementById('ov-api').classList.add('on');}
  else if(S.page==='data'){renderDataView();document.getElementById('ov-data').classList.add('on');}
  else if(S.page==='coverage'){renderCovView();document.getElementById('ov-cov').classList.add('on');}
}

function togFilter(){S.filterOpen=!S.filterOpen;renderMain();}

  const fb=document.getElementById('filterbar');

// ═══ JOURNEY CANVAS ═══
const NW=160,NH=44,DW=48;

// Get consistent connection points for any node type
function getPort(n,side){
  // side: 'right' (outgoing) or 'left' (incoming)
  if(n.type==='decision'){
    const cx=n.x+DW/2,cy=n.y+DW/2;
    return side==='right'?{x:n.x+DW,y:cy}:{x:n.x,y:cy};
  }
  if(side==='right') return {x:n.x+NW,y:n.y+NH/2};
  return {x:n.x,y:n.y+NH/2};
}

// Build a clean bezier between two points
function bezier(fx,fy,tx,ty){
  const dx=Math.abs(tx-fx);
  const cp=Math.max(dx*.4,30); // control point offset
  return `M${fx},${fy} C${fx+cp},${fy} ${tx-cp},${ty} ${tx},${ty}`;
}

function renderCanvas(){
  const j=JJ[S.ji],g=document.getElementById('sg');g.innerHTML='';
  const litN=new Set(),litE=new Set(),hasP=S.chosenPath.length>0;
  const nm={};j.nodes.forEach(n=>{nm[n.id]=n;});

  // Build lit sets from chosen decisions
  if(hasP){
    S.chosenPath.forEach(c=>{litN.add(c.decId);litN.add(c.targetId);});
    j.nodes.filter(n=>n.type==='entry').forEach(n=>litN.add(n.id));
    // Flood-fill: propagate through non-optional edges and chosen optional edges
    let changed=true,safety=0;
    while(changed&&safety++<100){changed=false;
      j.edges.forEach((e,i)=>{
        const fromLit=litN.has(e.from);
        if(!fromLit) return;
        // Non-optional edge: always follow
        if(!e.opt&&!litN.has(e.to)){litN.add(e.to);changed=true;}
        // Optional edge: only follow if this is the chosen option for that decision
        if(e.opt){
          const chosen=S.chosenPath.find(c=>c.decId===e.from&&c.opt===e.opt);
          if(chosen&&!litN.has(e.to)){litN.add(e.to);changed=true;}
        }
        // Mark edge as lit if both endpoints are lit
        if(litN.has(e.from)&&litN.has(e.to)&&!litE.has(i)){litE.add(i);changed=true;}
      });
    }
  }

  // Draw edges first (behind nodes)
  j.edges.forEach((e,ei)=>{
    const fn=nm[e.from],tn=nm[e.to];if(!fn||!tn)return;
    if(fn.type==='step'&&(!S.layers[fn.layer]||!S.statuses[fn.status]))return;
    if(tn.type==='step'&&(!S.layers[tn.layer]||!S.statuses[tn.status]))return;

    const fp=getPort(fn,'right');
    const tp=getPort(tn,'left');
    const d=bezier(fp.x,fp.y,tp.x,tp.y);

    const isLit=hasP&&litE.has(ei);
    const isDim=hasP&&!litE.has(ei);
    const type=e.opt?'dec':'flow';

    g.appendChild(svg('path',{d,class:`conn ${type}${isLit?' lit':''}${isDim?' dim':''}`,fill:'none','marker-end':e.opt?'url(#ao)':'url(#ag)'}));
    // Animated particle (only on non-dimmed edges)
    if(!isDim) g.appendChild(svg('path',{d,class:`anim${isLit?' lit':''}`,stroke:e.opt?'#e89048':'#3d8c75'}));
  });

  // Draw nodes
  j.nodes.forEach(n=>{
    if(n.type==='step'&&(!S.layers[n.layer]||!S.statuses[n.status]))return;
    const dim=hasP&&!litN.has(n.id)&&n.type!=='entry';
    if(n.type==='decision')renderDec(g,n,dim,j);
    else if(n.type==='entry')renderEnt(g,n);
    else renderNd(g,n,dim);
  });

  // Calculate viewBox from node bounds
  let mnX=Infinity,mnY=Infinity,mxX=0,mxY=0;
  j.nodes.forEach(n=>{
    mnX=Math.min(mnX,n.x-40);mnY=Math.min(mnY,n.y-40);
    mxX=Math.max(mxX,n.x+(n.type==='decision'?DW:NW)+100);
    mxY=Math.max(mxY,n.y+(n.type==='decision'?DW:NH)+60);
  });
  document.getElementById('svg').setAttribute('viewBox',
    `${mnX-S.px/S.zoom} ${mnY-S.py/S.zoom} ${(mxX-mnX)/S.zoom} ${(mxY-mnY)/S.zoom}`);

  // Pathbar — clickable to clear
  const pb=document.getElementById('pathbar');
  if(S.chosenPath.length){
    pb.innerHTML=S.chosenPath.map(c=>{
      const dn=j.nodes.find(n=>n.id===c.decId);
      return`<span class="pa">${esc(dn?.label||'')}</span><span class="ps">\u2192</span><span>${esc(c.opt)}</span>`;
    }).join('<span class="ps"> | </span>')+'<span class="clear-x">\u00D7</span>';
  } else {
    pb.innerHTML='';
  }
}
function renderNd(g,n,dim){
  const lc=LC[n.layer],sc=SC[n.status];
  const gr=svg('g',{class:`nd${S.sel?.id===n.id?' on':''}${dim?' dim':''}`,style:`--nc:${lc.c}`});
  gr.onclick=()=>{S.sel=n;renderCanvas();renderPanel();};
  gr.onmouseenter=e=>showTip(e,n);gr.onmouseleave=hideTip;
  gr.appendChild(svg('rect',{x:n.x,y:n.y,width:NW,height:NH,class:'nb',fill:h(lc.c,.10),stroke:h(lc.c,.28),'stroke-width':1,rx:10,ry:10}));
  gr.appendChild(svg('rect',{x:n.x,y:n.y,width:3,height:NH,fill:lc.c,class:'nbar'}));
  gr.appendChild(svg('circle',{cx:n.x+13,cy:n.y+NH/2,r:3.5,fill:n.status==='planned'?'transparent':sc.c,stroke:sc.c,'stroke-width':n.status==='planned'?1.5:0}));
  let lb=svg('text',{x:n.x+24,y:n.y+18,class:'nl'});lb.textContent=tr(n.label,20);gr.appendChild(lb);
  let sl=svg('text',{x:n.x+24,y:n.y+32,class:'ns'});sl.textContent=n.route?tr(n.route,24):lc.l;gr.appendChild(sl);
  if(n.errors?.length){
    gr.appendChild(svg('circle',{cx:n.x+NW-11,cy:n.y+11,r:5,fill:'#b84040',opacity:.6}));
    let et=svg('text',{x:n.x+NW-11,y:n.y+14,'text-anchor':'middle',fill:'#fff','font-size':'7px','font-family':"'DM Mono',monospace",'font-weight':'600','pointer-events':'none'});et.textContent=n.errors.length;gr.appendChild(et);
  }
  g.appendChild(gr);
}
function renderEnt(g,n){
  const gr=svg('g',{class:'nd'});
  gr.appendChild(svg('rect',{x:n.x,y:n.y,width:NW,height:NH,rx:NH/2,ry:NH/2,fill:h('#3d8c75',.12),stroke:h('#3d8c75',.3),'stroke-width':1}));
  gr.appendChild(svg('polygon',{points:`${n.x+14},${n.y+NH/2-5} ${n.x+22},${n.y+NH/2} ${n.x+14},${n.y+NH/2+5}`,fill:'#3d8c75',opacity:.6}));
  let lb=svg('text',{x:n.x+28,y:n.y+NH/2+4,class:'nl','font-size':'10.5px'});lb.textContent=tr(n.label,20);gr.appendChild(lb);
  g.appendChild(gr);
}
function renderDec(g,n,dim,j){
  const gr=svg('g',{class:`dn${dim?' dim':''}`});
  const cx=n.x+DW/2,cy=n.y+DW/2;
  gr.appendChild(svg('polygon',{points:`${cx},${n.y} ${n.x+DW},${cy} ${cx},${n.y+DW} ${n.x},${cy}`,class:'db',fill:h('#e89048',.12),stroke:h('#e89048',.35),'stroke-width':1}));
  let dl=svg('text',{x:cx,y:cy+3,class:'dl','font-size':'8.5px'});dl.textContent='?';gr.appendChild(dl);
  let tl=svg('text',{x:cx,y:n.y-8,'text-anchor':'middle','font-size':'9.5px',fill:'#e89048','font-family':"'DM Sans',sans-serif",'font-weight':'500','pointer-events':'none'});tl.textContent=tr(n.label,28);gr.appendChild(tl);
  g.appendChild(gr);
  if(!n.options)return;

  const edges=j.edges.filter(e=>e.from===n.id&&e.opt);
  const hasChoice=S.chosenPath.some(c=>c.decId===n.id);

  n.options.forEach(opt=>{
    const te=edges.find(e=>e.opt===opt.label);if(!te)return;
    const tn=j.nodes.find(nn=>nn.id===opt.to);if(!tn)return;

    // Position pill along the edge between decision and target
    const fp=getPort(n,'right');
    const tp=getPort(tn,'left');
    const pw=Math.min(opt.label.length*5.5+18,115),ph=18;
    // Place at ~30% along the bezier
    const t=0.3;
    const px=fp.x*(1-t)+tp.x*t-pw/2;
    const py=fp.y*(1-t)+tp.y*t-ph/2;

    const isChosen=S.chosenPath.some(c=>c.decId===n.id&&c.opt===opt.label);
    const isUnchosen=hasChoice&&!isChosen;
    const cls=`dopt${isChosen?' chosen':''}${isUnchosen?' unchosen':''}`;

    const og=svg('g',{class:cls});
    og.appendChild(svg('rect',{x:px,y:py,width:pw,height:ph,rx:ph/2,class:'doptbg',
      fill:isChosen?h('#e89048',.22):h('#e89048',.08),
      stroke:h('#e89048',isChosen?.55:.2),'stroke-width':1}));
    let ol=svg('text',{x:px+pw/2,y:py+ph/2+3,'text-anchor':'middle',class:'doptlbl'});
    ol.textContent=tr(opt.label,17);og.appendChild(ol);

    // Click to choose (or switch) — always clickable
    og.onclick=(e)=>{
      e.stopPropagation();
      S.chosenPath=S.chosenPath.filter(c=>c.decId!==n.id);
      S.chosenPath.push({decId:n.id,opt:opt.label,targetId:opt.to});
      renderCanvas();renderPanel();
    };
    g.appendChild(og);
  });
}
function rstPath(){S.chosenPath=[];renderCanvas();renderPanel();}

function renderLcCanvas(){
  const lc=LIFECYCLES[S.li];
  const g=document.getElementById('sg');g.innerHTML='';

  // Title
  const title=svg('text',{x:60,y:40,'font-size':'18px',fill:'var(--t2)','font-family':"'DM Serif Display',serif"});
  title.textContent=lc.name+' Lifecycle';g.appendChild(title);
  const desc=svg('text',{x:60,y:60,'font-size':'10px',fill:'var(--t4)','font-family':"'DM Sans',sans-serif"});
  desc.textContent=lc.desc;g.appendChild(desc);

  // Draw transitions first (behind states)
  lc.transitions.forEach(tr=>{
    const fs=lc.states.find(s=>s.id===tr.from),ts=lc.states.find(s=>s.id===tr.to);
    if(!fs||!ts)return;

    let fx,fy,tx,ty;
    if(tr.fx!=null){fx=tr.fx;fy=tr.fy;tx=tr.tx;ty=tr.ty;}
    else{
      const side=tr.side||'r-l';
      if(side==='r-l'){fx=fs.x+LW;fy=fs.y+LH/2;tx=ts.x;ty=ts.y+LH/2;}
      else if(side==='b-t'){fx=fs.x+LW/2;fy=fs.y+LH;tx=ts.x+LW/2;ty=ts.y;}
      else if(side==='t-b'){fx=fs.x+LW/2;fy=fs.y;tx=ts.x+LW/2;ty=ts.y+LH;}
      else{fx=fs.x+LW;fy=fs.y+LH/2;tx=ts.x;ty=ts.y+LH/2;}
    }

    const dx=tx-fx,dy=ty-fy;
    const isH=Math.abs(dx)>Math.abs(dy);
    let d;
    if(isH){const cp=Math.max(Math.abs(dx)*.35,40);const sx=dx>0?1:-1;d=`M${fx},${fy} C${fx+cp*sx},${fy} ${tx-cp*sx},${ty} ${tx},${ty}`;}
    else{const cp=Math.max(Math.abs(dy)*.4,30);const sy=dy>0?1:-1;d=`M${fx},${fy} C${fx},${fy+cp*sy} ${tx},${ty-cp*sy} ${tx},${ty}`;}

    // Arrow
    const p=svg('path',{d,fill:'none',stroke:h(fs.c,.25),'stroke-width':1.5,'marker-end':'url(#ag)'});
    g.appendChild(p);
    // Animated particle
    g.appendChild(svg('path',{d,class:'anim',stroke:fs.c}));

    // Label pill at midpoint
    const lx=(fx+tx)/2,ly=(fy+ty)/2;
    const tw=tr.label.length*6+16,th=20;
    const pill=svg('rect',{x:lx-tw/2,y:ly-th/2,width:tw,height:th,rx:th/2,fill:'var(--b1)',stroke:'var(--bd2)','stroke-width':1});
    g.appendChild(pill);
    const lbl=svg('text',{x:lx,y:ly+4,'text-anchor':'middle','font-size':'10px',fill:'var(--t2)','font-family':"'DM Mono',monospace",'pointer-events':'none'});
    lbl.textContent=tr.label;g.appendChild(lbl);
  });

  // Draw state nodes on top
  lc.states.forEach(st=>{
    const grp=svg('g',{class:'nd',style:`--nc:${st.c}`});
    grp.onclick=()=>{S.sel={type:'lc-state',state:st,lc};renderPanel();document.querySelectorAll('.nd').forEach(n=>n.classList.remove('on'));grp.classList.add('on');};

    grp.appendChild(svg('rect',{x:st.x,y:st.y,width:LW,height:LH,rx:10,ry:10,class:'nb',fill:h(st.c,.10),stroke:h(st.c,.30),'stroke-width':1}));
    grp.appendChild(svg('rect',{x:st.x,y:st.y,width:4,height:LH,fill:st.c,rx:2}));
    const lb=svg('text',{x:st.x+LW/2,y:st.y+LH/2+5,'text-anchor':'middle','font-size':'12px','font-weight':'500',fill:st.c,'font-family':"'DM Sans',sans-serif",'pointer-events':'none'});
    lb.textContent=st.label;grp.appendChild(lb);
    g.appendChild(grp);
  });

  // ViewBox
  let mnX=Infinity,mnY=20,mxX=0,mxY=0;
  lc.states.forEach(st=>{mnX=Math.min(mnX,st.x-40);mxX=Math.max(mxX,st.x+LW+80);mxY=Math.max(mxY,st.y+LH+60);});
  document.getElementById('svg').setAttribute('viewBox',
    `${mnX-S.px/S.zoom} ${mnY-S.py/S.zoom} ${(mxX-mnX)/S.zoom} ${(mxY-mnY)/S.zoom}`);
}

function renderCovView(){

function renderEntPanel(el){
  const ent=S.sel.data;
  let html=`<div class="dh"><div class="dlbl">${esc(ent.n)}</div><div class="dtags"><span class="dtag" style="background:rgba(61,140,117,.12);color:#3d8c75">${esc(ent.b)}</span></div></div>`;
  if(ent.why)html+=`<div class="dsec"><div class="dsect">Why This Exists</div><div class="dwhy">${esc(ent.why)}</div></div>`;
  html+=`<div class="dsec"><div class="dsect">Fields (${ent.f.length})</div>`;
  ent.f.forEach(f=>{html+=`<div class="dfield"><span class="dfn">${esc(f.n)}</span><span class="dft">${esc(f.t)}</span><span class="dfd">${esc(f.d)}</span></div>`;});
  html+=`</div>`;
  el.innerHTML=html;
}

function renderLcPanel(el){
  const lc=S.sel.data;
  let html=`<div class="dh"><div class="dlbl">${esc(lc.name)} Lifecycle</div><div class="dtags"><span class="dtag" style="background:rgba(61,140,117,.12);color:#3d8c75">${esc(lc.badge)}</span></div></div>`;
  if(lc.why)html+=`<div class="dsec"><div class="dsect">Why This Matters</div><div class="dwhy">${esc(lc.why)}</div></div>`;
  html+=`<div class="dsec"><div class="dsect">States</div>`;
  lc.states.forEach(st=>{html+=`<div style="display:flex;align-items:center;gap:6px;padding:3px 0"><span style="width:8px;height:8px;border-radius:3px;background:${st.c};flex-shrink:0"></span><span style="font:11px/1 var(--fs);color:var(--t1)">${esc(st.label)}</span></div>`;});
  html+=`</div><div class="dsec"><div class="dsect">Transitions</div>`;
  lc.transitions.forEach(tr=>{
    const fs=lc.states.find(s=>s.id===tr.from),ts=lc.states.find(s=>s.id===tr.to);
    html+=`<div style="font:11px/1.4 var(--fm);color:var(--t2);padding:2px 0">${esc(fs?.label||'')} <span style="color:var(--g4)">\u2192</span> ${esc(ts?.label||'')} <span style="color:var(--t4);font-size:10px">(${esc(tr.label)})</span></div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
}

function renderLcStatePanel(el){
  const {state:st,lc}=S.sel;
  // Find transitions from/to this state
  const fromTr=lc.transitions.filter(t=>t.from===st.id);
  const toTr=lc.transitions.filter(t=>t.to===st.id);

  let html=`<div class="dh"><div class="dlbl">${esc(st.label)}</div><div class="dtags"><span class="dtag" style="background:${h(st.c,.12)};color:${st.c}"><span class="dd" style="background:${st.c}"></span>${esc(lc.name)}</span></div></div>`;

  if(toTr.length){
    html+=`<div class="dsec"><div class="dsect">How you get here (${toTr.length})</div>`;
    toTr.forEach(t=>{
      const fs=lc.states.find(s=>s.id===t.from);
      html+=`<div style="font:11px/1.5 var(--fs);color:var(--t2);padding:3px 0"><span style="color:${fs?.c||'var(--t3)'};font-weight:500">${esc(fs?.label||'')}</span> <span style="color:var(--t4)">\u2192</span> <span style="font-family:var(--fm);font-size:10px;color:var(--g4)">${esc(t.label)}</span></div>`;
    });
    html+=`</div>`;
  }

  if(fromTr.length){
    html+=`<div class="dsec"><div class="dsect">Where it goes (${fromTr.length})</div>`;
    fromTr.forEach(t=>{
      const ts=lc.states.find(s=>s.id===t.to);
      html+=`<div style="font:11px/1.5 var(--fs);color:var(--t2);padding:3px 0"><span style="font-family:var(--fm);font-size:10px;color:var(--o4)">${esc(t.label)}</span> <span style="color:var(--t4)">\u2192</span> <span style="color:${ts?.c||'var(--t3)'};font-weight:500">${esc(ts?.label||'')}</span></div>`;
    });
    html+=`</div>`;
  }

  if(!fromTr.length) html+=`<div class="dsec"><div class="dsect">Terminal State</div><div class="dwhy">This is a terminal state \u2014 no further transitions are possible from here.</div></div>`;

  el.innerHTML=html;
}

function renderCovPanel(el){
  const j=S.sel.data;
  const st=j.nodes.filter(n=>n.type==='step'),total=st.length;
  const built=st.filter(s=>s.status!=='planned').length,tested=st.filter(s=>s.status==='tested').length;
  const planned=st.filter(s=>s.status==='planned');
  const untested=st.filter(s=>s.status==='built');
  let html=`<div class="dh"><div class="dlbl">${esc(j.title)}</div><div class="dtags"><span class="dtag" style="background:rgba(61,140,117,.12);color:#3d8c75">${esc(j.persona)}</span></div></div>`;
  html+=`<div class="dsec"><div class="dsect">Summary</div><div class="dnt">${esc(j.desc)}</div></div>`;
  html+=`<div class="dsec"><div class="dsect">Coverage Breakdown</div><div class="dnt">${built}/${total} steps built (${total?Math.round(built/total*100):0}%)<br>${tested}/${total} steps tested (${total?Math.round(tested/total*100):0}%)</div></div>`;
  if(planned.length){
    html+=`<div class="dsec"><div class="dsect">Not Yet Built (${planned.length})</div>`;
    planned.forEach(s=>{html+=`<div style="font:11px/1.4 var(--fs);color:var(--m4);padding:2px 0">\u2022 ${esc(s.label)}</div>`;});
    html+=`</div>`;
  }
  if(untested.length){
    html+=`<div class="dsec"><div class="dsect">Built but Untested (${untested.length})</div>`;
    untested.forEach(s=>{html+=`<div style="font:11px/1.4 var(--fs);color:var(--o4);padding:2px 0">\u2022 ${esc(s.label)}</div>`;});
    html+=`</div>`;
  }
  el.innerHTML=html;
}

// ═══ ZOOM & PAN ═══
function doZ(d){S.zoom=Math.max(.25,Math.min(3,S.zoom+d));document.getElementById('zl').textContent=Math.round(S.zoom*100)+'%';renderCanvas();}
function rstZ(){S.zoom=1;S.px=0;S.py=0;document.getElementById('zl').textContent='100%';renderCanvas();}
const cw=document.getElementById('canvasWrap');
cw.addEventListener('mousedown',e=>{if(e.target.closest('.nd,.dn,.dopt,.zoom,.zb'))return;S.pan=true;S.ps={x:e.clientX-S.px,y:e.clientY-S.py};});
cw.addEventListener('mousemove',e=>{if(!S.pan)return;S.px=e.clientX-S.ps.x;S.py=e.clientY-S.ps.y;renderCanvas();});
cw.addEventListener('mouseup',()=>{S.pan=false;});
cw.addEventListener('mouseleave',()=>{S.pan=false;});
cw.addEventListener('wheel',e=>{e.preventDefault();doZ(e.deltaY>0?-.06:.06);},{passive:false});

// ═══ BOOT ═══
init();
</script>
</body>
</html>
